<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario TI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Inventario de Dispositivos</h2>
        <input type="hidden" id="id">
        <input type="text" id="nombre" placeholder="Nombre del usuario">

        <select id="tipo" onchange="actualizarMarcas()">
            <option value="">Tipo</option>
            <option value="Laptop">💻 Laptop</option>
            <option value="PC">🖥️ PC</option>
            <option value="Impresora">🖨️ Impresora</option>
            <option value="Monitor">📺 Monitor</option>
            <option value="Celular">📱 Celular</option>
        </select>

        <select id="marca">
            <option value="">Marca</option>
        </select>

        <select id="estado">
            <option value="">Estado</option>
            <option value="Activo">✅ Activo</option>
            <option value="En reparación">🛠️ En reparación</option>
            <option value="Baja">⛔ Baja</option>
        </select>

        <select id="area">
            <option value="">Área</option>
            <option value="Sistemas">💻 Sistemas</option>
            <option value="Administración">🏢 Administración</option>
            <option value="Recursos Humanos">👥 RRHH</option>
            <option value="Finanzas">📈 Finanzas</option>
            <option value="Operaciones">⚙️ Operaciones</option>
        </select>

        <textarea id="descripcion" rows="3" placeholder="Descripción o detalles del dispositivo..."></textarea>

        <div style="margin: 10px 0; background: #34495e; padding: 10px; border-radius: 8px;">
            <label style="display: block; margin-bottom: 5px;">Subir foto del equipo:</label>
            <input type="file" id="imagen" accept="image/*">
            <img id="preview" src="" style="display: none; max-width: 80px; margin-top: 10px; border-radius: 5px; border: 2px solid white;">
        </div>

        <div class="buttons">
            <button onclick="create()">💾 Guardar</button>
            <button onclick="update()">🔄 Actualizar</button>
        </div>

        <h3>Lista de dispositivos</h3>
        <input type="text" id="buscador" placeholder="🔍 Buscar..." onkeyup="filtrar()">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Foto</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Marca</th> <th>Estado</th>
                    <th>Área</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
